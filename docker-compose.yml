services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Your_strong_Password123}"
    ports: ["1433:1433"]
    volumes: ["sql-data:/var/opt/mssql"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '$${MSSQL_SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=CRNProducts;User Id=sa;Password=${SA_PASSWORD:-Your_strong_Password123};TrustServerCertificate=True
      Jwt__Key: ${JWT_KEY:-CHANGE_ME_TO_A_SECURE_RANDOM_KEY_WITH_32_PLUS_CHARACTERS}
      AllowedOrigins__0: http://localhost:5173
      AllowedOrigins__1: http://localhost:8081
    ports: ["8080:8080"]
    depends_on:
      sqlserver:
        condition: service_healthy
  web:
    build:
      context: ./src/Web
      args:
        VITE_API_URL: http://localhost:8080/api/v1
    ports: ["8081:80"]
    depends_on: [api]
volumes:
  sql-data:
